name: Clone KolibriOS and Commit (Reliable)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clone-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (force main branch)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clean previous kolibrios (avoid submodule issues)
        run: |
          git rm -r --cached kolibrios || true
          rm -rf kolibrios
          rm -f .gitmodules || true

      - name: Clone KolibriOS
        run: |
          git clone --depth 1 https://github.com/KolibriOS/kolibrios.git kolibrios

      - name: Stage files
        run: |
          git add -A

      - name: Commit (always attempt)
        run: |
          git commit -m "Add KolibriOS snapshot" || echo "No changes to commit"

      - name: Show status (debug)
        run: |
          git status
          git log -1 || true

      - name: Push explicitly to origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} HEAD:main
