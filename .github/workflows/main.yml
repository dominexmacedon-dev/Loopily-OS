name: Clone KolibriOS and Commit (Safe Vendor Mode)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clone-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo cleanly
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: HARD FIX - remove any submodule tracking of kolibrios
        run: |
          # Remove submodule metadata if exists
          rm -f .gitmodules || true

          # Remove gitlink if it exists in index (IMPORTANT FIX)
          git rm --cached kolibrios || true

          # Clean any leftover config
          git config -f .git/config --remove-section submodule.kolibrios || true

      - name: Clone KolibriOS fresh
        run: |
          rm -rf kolibrios
          git clone --depth 1 https://github.com/KolibriOS/kolibrios.git kolibrios

      - name: Force add as normal folder (NOT submodule)
        run: |
          git add -f kolibrios

      - name: Verify staging
        run: |
          git status

      - name: Commit snapshot safely
        run: |
          git commit -m "Add KolibriOS source snapshot" || echo "Nothing to commit"

      - name: Push changes safely
        run: |
          git push
