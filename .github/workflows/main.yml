name: Clone KolibriOS and Commit

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clone-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone KolibriOS into root folder
        run: |
          rm -rf kolibrios
          git clone --depth 1 https://github.com/KolibriOS/kolibrios.git kolibrios

      - name: Check changes
        id: changes
        run: |
          git add kolibrios
          if git diff --cached --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.changes.outputs.changes == 'true'
        run: |
          git commit -m "Add KolibriOS source snapshot"

      - name: Push changes
        if: steps.changes.outputs.changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push
